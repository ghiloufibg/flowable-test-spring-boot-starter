# kafka-clients and kafka-server-common's own test-jars each accidentally publish their own
# internal junit-platform.properties (a known upstream packaging bug, fixed in Kafka 3.9.0 --
# see KAFKA-17121/KAFKA-17307 -- but this project is pinned to 3.7.1, see EmbeddedFlowableKafkaSupport
# and FlowableTestDatasourceAutoConfiguration for why the Kafka/Flowable version chain can't move
# independently of Spring Boot 3.3.5's own managed versions). Discovering more than one on the
# classpath is harmless -- JUnit Platform deterministically picks the first and this project defines
# no junit-platform.properties of its own for the ambiguity to actually affect -- but it logs an
# AVERTISSEMENT/WARNING on every test JVM start. Silenced at the java.util.logging level rather than
# chased upstream, matching this project's existing precedent for known-benign third-party log noise.
org.junit.platform.launcher.core.LauncherConfigurationParameters.level = SEVERE
